<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phùng Quang Thanh</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    text-align:center;
    font-family:-apple-system;
}

/* title */
h1{
    color:#0ff;
}

/* coin */
#coin{
    font-size:18px;
    margin:10px;
}

/* dice */
#dice{
    font-size:70px;
    margin:20px;
}

/* slot */
.slot{
    font-size:50px;
    margin:10px;
}

/* result */
#result{
    font-size:40px;
}

/* input */
#code{
    padding:12px;
    width:70%;
    border:none;
    border-radius:10px;
    background:#111;
    color:#0ff;
}

/* button */
button{
    padding:12px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#f0f,#0ff);
    color:white;
}
</style>
</head>

<body>

<h1>Phùng Quang Thanh</h1>

<div id="coin">💰 Coin: 100000</div>

<div id="dice">🎲</div>

<div class="slot" id="slot">🍒 🍋 🔔</div>

<div id="result">--</div>

<input id="code" placeholder="Nhập mã...">

<br>

<button onclick="rollDice()">🎲 LẮC</button>
<button onclick="spinSlot()">🎰 QUAY SLOT</button>

<script>
let coin = Number(localStorage.getItem("coin")||1000);

function save(){
    localStorage.setItem("coin",coin);
    document.getElementById("coin").innerText="💰 Coin: "+coin;
}
save();

// âm thanh
function sound(url){
    new Audio(url).play();
}

// xúc xắc
function rollDice(){

    let code=document.getElementById("code").value;
    if(!code) return alert("Nhập mã");

    coin -= 500;

    let dice=document.getElementById("dice");

    let i=0;
    let inter=setInterval(()=>{
        dice.innerText=["⚀","⚁","⚂","⚃","⚄","⚅"][Math.floor(Math.random()*6)];
        i++;
        if(i>20){
            clearInterval(inter);
            resultDice(code);
        }
    },50);

    sound("https://www.soundjay.com/misc/sounds/dice-roll-1.mp3");
    save();
}

function resultDice(code){

    let seed=0;
    for(let i of code){
        seed+=i.charCodeAt(0);
    }

    let win=(seed+Math.random()*10)%2;
    win=Math.round(win);

    if(win){
        coin+=1000;
        document.getElementById("result").innerText="🔥 WIN!";
    }else{
        document.getElementById("result").innerText="❄️ LOSE!";
    }

    sound("https://www.soundjay.com/buttons/sounds/button-10.mp3");
    save();
}

// slot machine
function spinSlot(){

    coin -= 500;

    let icons=["🍒","🍋","🔔","💎","7️⃣"];

    let slot=document.getElementById("slot");

    let i=0;
    let inter=setInterval(()=>{
        let a=icons[Math.floor(Math.random()*icons.length)];
        let b=icons[Math.floor(Math.random()*icons.length)];
        let c=icons[Math.floor(Math.random()*icons.length)];
        slot.innerText=a+" "+b+" "+c;
        i++;

        if(i>20){
            clearInterval(inter);
            resultSlot(a,b,c);
        }
    },80);

    sound("https://www.soundjay.com/misc/sounds/slot-machine-1.mp3");
    save();
}

function resultSlot(a,b,c){

    if(a==b && b==c){
        coin+=5000;
        document.getElementById("result").innerText="💎 JACKPOT!";
    }else{
        document.getElementById("result").innerText="❌ MISS";
    }

    sound("https://www.soundjay.com/buttons/sounds/button-10.mp3");
    save();
}
</script>

</body>
</html>
