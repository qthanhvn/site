<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI TÀI XỈU VIP PRO MAX</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#0a0a0a,#000);
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    color:#00ffff;
    text-shadow:0 0 20px #00ffff;
}

#result{
    font-size:70px;
    margin:20px;
    animation: glow 1s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #ff00ff;}
    to{ text-shadow:0 0 30px #00ffff;}
}

button{
    padding:15px 30px;
    font-size:18px;
    margin:5px;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    border:none;
    border-radius:10px;
    color:white;
}

#chart{
    display:flex;
    justify-content:center;
    margin-top:20px;
}

.bar{
    width:10px;
    margin:2px;
    background:#00ffff;
}

</style>
</head>

<body>

<h1>🎮 AI TÀI XỈU VIP PRO MAX</h1>

<div id="result">--</div>
<div id="conf">--</div>

<button onclick="predict()">DỰ ĐOÁN</button>
<button onclick="toggleAuto()">AUTO</button>

<div id="chart"></div>
<div id="history"></div>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
let history=[];
let auto=false;

// AI VIP
function ai(data){
    let score=0;

    for(let i=0;i<data.length-1;i++){
        score += (data[i]===data[i+1])?1:-1;
    }

    let pattern = data.join("");

    if(pattern.includes("111")) score+=2;
    if(pattern.includes("000")) score-=2;

    let prob = (score + Math.random()*2)/5;

    return prob>0.5?1:0;
}

function predict(){

    if(history.length<5){
        history.push(Math.random()>0.5?1:0);
        return;
    }

    let input = history.slice(-5);

    let r = ai(input);

    let conf = (70 + Math.random()*30).toFixed(2);

    document.getElementById("result").innerText =
        r?"🔥 TÀI":"❄️ XỈU";

    document.getElementById("conf").innerText =
        "CONF: "+conf+"%";

    history.push(r);

    document.getElementById("sound").play();

    render();
}

function render(){
    document.getElementById("history").innerText =
        "Lịch sử: "+history.map(x=>x?"T":"X").join("-");

    let chart=document.getElementById("chart");
    chart.innerHTML="";

    history.slice(-30).forEach(x=>{
        let b=document.createElement("div");
        b.className="bar";
        b.style.height = x? "40px":"20px";
        b.style.background = x?"#ff00ff":"#00ffff";
        chart.appendChild(b);
    });
}

function toggleAuto(){
    auto=!auto;
    if(auto) loop();
}

function loop(){
    if(!auto) return;
    predict();
    setTimeout(loop,1000);
}
</script>

</body>
</html>
